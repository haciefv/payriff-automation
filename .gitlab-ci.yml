stages:
  - test

variables:
  CI: "true"
  NODE_ENV: "test"

e2e:smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v1.57.0-jammy
  timeout: 30m

  before_script:
    # 1️⃣ Dependency-lər
    - npm ci
    - npx playwright install --with-deps

    # 2️⃣ OTP server availability check (BURDA elave olunur)

    - echo "OTP_SERVER_URL=$OTP_SERVER_URL"
    - curl -fsS "$OTP_SERVER_URL/health"

  script:
    # 3️⃣ Auth / storageState setup (ƏVVƏLCƏ İŞLƏYİR)
    - echo "Running auth setup..."
    - npx playwright test tests/.auth/admin.setup.spec.js --workers=1

    # 4️⃣ Smoke test (OTP + 3DS)
    - echo "Running smoke test..."
    - npx playwright test tests/smoke/regular-3ds-payment.spec.js --workers=1

  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      - artifacts/
    expire_in: 7 days

  rules:
    - when: always
